<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Product Dashboard</h1>

<a href="/create">+ Add Product</a>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Actions</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.description }}</td>
        <td>{{ p.price }}</td>
        <td>{{ p.quantity }}</td>
        <td>
            <a href="/edit/{{ p.id }}">Edit</a>
            <a href="/delete/{{ p.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
