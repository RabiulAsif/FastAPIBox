<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div>
            <button id="myButton1"></button>
            <button id="myButton2"></button>
            <h2>CLICK THE BOX<br>TO COPY THE GRADIENT</h2>
            <div class="copyCode">
                background-image: linear-gradient(to right, rgb(92, 145, 229), rgb(152, 63, 198));
            </div>
        </div>
    </section>
    <script>
    let button1 = document.getElementById("myButton1");
    let button2 = document.getElementById("myButton2");
    let copyDiv = document.querySelector(".copyCode");
    let rgb1 = "#004773";
    let rgb2 = "#54d542";

    const hexValues = () => {
        let theHexaValues = "0123456789abcdef";
        let colors = "#";

        for (let i = 0; i < 6; i++) {
            colors += theHexaValues[Math.floor(Math.random() * 16)];
        }
        return colors;   
    };

    const handleButton1 = () => {
        rgb1 = hexValues();
        console.log(rgb1);
        button1.innerText = rgb1;
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        copyDiv.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;
    };

    const handleButton2 = () => {
        rgb2 = hexValues();
        console.log(rgb2);
        button2.innerText = rgb2;
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        copyDiv.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;
    };

    button1.addEventListener("click", handleButton1);
    button2.addEventListener("click", handleButton2);

    copyDiv.addEventListener("click", () => {
        navigator.clipboard.writeText(copyDiv.innerText);
    });
    </script>
</body>
</html>
